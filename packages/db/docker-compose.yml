name: klinik-AI

services:
  postgres:
    image: postgres
    container_name: klinik-AI-postgres
    environment:
      POSTGRES_DB: klinik-AI
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - klinik-AI_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  klinik-AI_postgres_data:
